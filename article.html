<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bài viết - Hội Phụ Nữ CAND</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red: #c0152a; --red-dark: #8b0e1d; --gold: #c9a84c;
      --cream: #fdf8f2; --ink: #1a1208; --muted: #6b5f52; --border: #e8ddd0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--cream); color: var(--ink); font-family: 'Be Vietnam Pro', sans-serif; }

    header {
      background: var(--red); padding: 0 2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 0;
    }
    .logo { display: flex; align-items: center; gap: 1rem; text-decoration: none; }
    .logo-icon { width: 44px; height: 44px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
    .logo-text { color: white; }
    .logo-text h1 { font-family: 'Playfair Display', serif; font-size: 1.1rem; }
    .logo-text span { font-size: 0.65rem; opacity: 0.8; letter-spacing: 2px; text-transform: uppercase; }

    .container { max-width: 800px; margin: 0 auto; padding: 2.5rem 1.5rem; }

    .back-link {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: var(--muted); text-decoration: none; font-size: 0.82rem;
      margin-bottom: 1.5rem; transition: color 0.2s;
    }
    .back-link:hover { color: var(--red); }

    .article-tag {
      font-size: 0.65rem; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase; color: var(--red);
      margin-bottom: 0.75rem; display: block;
    }
    .article-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem; line-height: 1.3; margin-bottom: 1rem;
    }
    .article-meta {
      display: flex; gap: 1.5rem; flex-wrap: wrap;
      font-size: 0.8rem; color: var(--muted);
      padding: 1rem 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .article-thumbnail {
      width: 100%; max-height: 440px; object-fit: cover;
      border-radius: 2px; margin-bottom: 2rem; display: block;
    }
    .article-content {
      font-size: 1rem; line-height: 1.9; color: #2a1f10;
    }
    .article-content p { margin-bottom: 1.2rem; }
    .article-content h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem; margin: 2rem 0 0.75rem; color: var(--red);
    }
    .article-content img { max-width: 100%; margin: 1.5rem 0; }
    .article-content blockquote {
      border-left: 3px solid var(--gold); padding: 0.5rem 1.5rem;
      font-style: italic; color: var(--muted); margin: 1.5rem 0;
      background: rgba(201,168,76,0.07);
    }

    .loading { text-align: center; padding: 4rem; color: var(--muted); }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { background: var(--ink); color: rgba(255,255,255,0.6); padding: 2rem; text-align: center; font-size: 0.8rem; margin-top: 3rem; }
    footer strong { color: var(--gold); font-family: 'Playfair Display', serif; }

    @media (max-width: 600px) { .article-title { font-size: 1.5rem; } }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <a href="index.html" class="logo">
      <div class="logo-icon">🌸</div>
      <div class="logo-text">
        <h1>Hội Phụ Nữ CAND</h1>
        <span>Công An Nhân Dân</span>
      </div>
    </a>
  </div>
</header>

<div class="container">
  <a href="index.html" class="back-link">← Quay về trang chủ</a>

  <div id="loadingEl" class="loading">
    <div class="spinner"></div>
    Đang tải bài viết...
  </div>

  <article id="articleContent" style="display:none">
    <span class="article-tag" id="artTag"></span>
    <h1 class="article-title" id="artTitle"></h1>
    <div class="article-meta">
      <span id="artDate"></span>
      <span id="artAuthor"></span>
    </div>
    <img class="article-thumbnail" id="artThumb" style="display:none"/>
    <div class="article-content" id="artBody"></div>
  </article>

  <div id="errorEl" style="display:none; text-align:center; padding:3rem; color:var(--muted)">
    <h3 style="font-family:'Playfair Display',serif; margin-bottom:0.5rem">Không tìm thấy bài viết</h3>
    <a href="index.html" style="color:var(--red)">Về trang chủ</a>
  </div>
</div>

<footer>
  <strong>Hội Phụ Nữ Công An Nhân Dân</strong><br/>
  <span>© 2026 · Tất cả quyền được bảo lưu</span>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCNeUVQ25NxdLvRdF_JnB1zi-QEMuW4r3E",
    authDomain: "ban-phu-nu-cand.firebaseapp.com",
    projectId: "ban-phu-nu-cand",
    storageBucket: "ban-phu-nu-cand.firebasestorage.app",
    messagingSenderId: "422502379042",
    appId: "1:422502379042:web:8f8db43acaa987ee43e47b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const catLabels = {
    'tin-tuc':'Tin tức','su-kien':'Sự kiện',
    'hoat-dong':'Hoạt động','van-hoa':'Văn hóa','suc-khoe':'Sức khỏe'
  };

  const params = new URLSearchParams(location.search);
  const id = params.get('id');

  if (!id) {
    location.href = 'index.html';
  } else {
    const snap = await getDoc(doc(db, 'articles', id));
    document.getElementById('loadingEl').style.display = 'none';

    if (!snap.exists()) {
      document.getElementById('errorEl').style.display = 'block';
    } else {
      const a = snap.data();
      document.title = a.title + ' - Hội Phụ Nữ CAND';
      document.getElementById('artTag').textContent = catLabels[a.category] || 'Tin tức';
      document.getElementById('artTitle').textContent = a.title;

      const d = a.publishedAt?.toDate?.() || new Date();
      document.getElementById('artDate').textContent =
        '📅 ' + d.toLocaleDateString('vi-VN',{day:'2-digit',month:'long',year:'numeric'});
      document.getElementById('artAuthor').textContent = '✍️ ' + (a.author || 'BTV');

      if (a.thumbnail) {
        const img = document.getElementById('artThumb');
        img.src = a.thumbnail; img.alt = a.title; img.style.display = 'block';
      }

      // Render content (hỗ trợ xuống dòng)
      const content = (a.content || '').split('\n').filter(Boolean)
        .map(p => `<p>${p}</p>`).join('');
      document.getElementById('artBody').innerHTML = content;
      document.getElementById('articleContent').style.display = 'block';
    }
  }
</script>
</body>
</html>
